name: fluxo
description: Fluxo - Gestão Financeira Inteligente
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^12.1.3

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  gap: ^3.0.1
  shimmer: ^3.0.0

  # Charts
  fl_chart: ^0.68.0

  # Scanner NF-e
  mobile_scanner: ^5.1.1
  http: ^1.2.1
  html: ^0.15.4
  permission_handler: ^11.3.1

  # Utils
  intl: 0.20.2
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  flutter_native_splash: ^2.3.11
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#121A24"
  image: assets/images/splash.png
  android: true
  ios: true
  android_12:
    color: "#121A24"
    image: assets/images/splash.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/